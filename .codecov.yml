coverage:
  status:
    project:
      default:
        # basic
        target: 80%
        threshold: 1%
        base: auto
        # advanced
        branches:
          - main
        flags:
          - unittests
        if_ci_failed: success
        informational: false
        only_pulls: true
    patch:
      default:
        # basic
        target: auto
        threshold: 0%
        base: auto
        # advanced
        branches:
          - main
        flags:
          - unittests
        if_ci_failed: success
        informational: true
        only_pulls: true
ignore:
  - pkg/client/
  - pkg/testutil/
  - pkg/constant/
