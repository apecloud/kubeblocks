version: "2"
run:
  concurrency: 4
  timeout: 30m
output:
  formats:
    text:
      path: stdout
      print-linter-name: true
      print-issued-lines: true
linters:
  default: none
  enable:
    - errcheck
    - gocritic
    - govet
    - ineffassign
    - loggercheck
    - misspell
    - nakedret
    - unconvert
    - unused
  settings:
    errcheck:
      check-blank: false
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - gocritic
        text: "deprecatedComment"
      - linters:
          - govet
        text: "hostport"
    paths:
      - ^zz_generated.*
formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - ^zz_generated.*
