version: "2"
run:
  concurrency: 4
  timeout: 30m
output:
  formats:
    text:
      path: stdout
      print-linter-name: true
      print-issued-lines: true
linters:
  default: none
  enable:
    - errcheck
    - gocritic
    - govet
    - ineffassign
    - loggercheck
    - misspell
    - nakedret
    - unconvert
    - unused
  settings:
    errcheck:
      check-blank: false
    gocritic:
      disabled-checks:
        - deprecatedComment
    govet:
      disable:
        - hostport
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - ^zz_generated.*
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - ^zz_generated.*
      - third_party$
      - builtin$
      - examples$
