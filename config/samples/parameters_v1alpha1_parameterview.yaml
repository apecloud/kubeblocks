apiVersion: parameters.kubeblocks.io/v1alpha1
kind: ParameterView
metadata:
  labels:
    app.kubernetes.io/name: parameterview
    app.kubernetes.io/instance: parameterview-sample
    app.kubernetes.io/part-of: kubeblocks
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/created-by: kubeblocks
  name: parameterview-sample
spec:
  parameterRef:
    name: componentparameter-sample
  templateName: mysql-config
  fileName: my.cnf
  mode: ReadWrite
  content:
    type: MarkerLine
    text: |
      [U] [mysqld]
      [D] max_connections=200
