apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.14.0
  labels:
    app.kubernetes.io/name: kubeblocks
  name: parameterviews.parameters.kubeblocks.io
spec:
  group: parameters.kubeblocks.io
  names:
    categories:
    - kubeblocks
    kind: ParameterView
    listKind: ParameterViewList
    plural: parameterviews
    shortNames:
    - pv
    - pview
    singular: parameterview
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - description: referenced parameter name
      jsonPath: .spec.parameterRef.name
      name: PARAMETER
      type: string
    - description: config template name
      jsonPath: .spec.templateName
      name: TEMPLATE
      type: string
    - description: config file name
      jsonPath: .spec.fileName
      name: FILE
      type: string
    - description: view mode
      jsonPath: .spec.mode
      name: MODE
      type: string
    - description: status phase
      jsonPath: .status.phase
      name: PHASE
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: AGE
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: ParameterView is the Schema for the parameterviews API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ParameterViewSpec defines the desired state of ParameterView.
            properties:
              content:
                description: Content is the document for the selected file.
                properties:
                  text:
                    description: |-
                      Text is the user-facing document content.


                      When type is PlainText, Text is the raw editable file content.
                      When type is MarkerLine, each line is expected to begin with a marker such as
                      "[D]", "[S]", "[I]", or "[U]". The controller is responsible for parsing the
                      view document into raw file content before translating edits into ComponentParameter
                      patches.
                    type: string
                  type:
                    default: PlainText
                    description: Type declares how Text should be parsed and rendered.
                    enum:
                    - PlainText
                    - MarkerLine
                    type: string
                type: object
              contentHash:
                description: ContentHash optionally captures the effective source
                  content used to build the current view.
                type: string
              fileFormat:
                description: FileFormat identifies the file format used by the selected
                  config file.
                enum:
                - xml
                - ini
                - yaml
                - json
                - hcl
                - dotenv
                - toml
                - properties
                - redis
                - props-plus
                - props-ultra
                type: string
              fileName:
                description: FileName identifies the config file inside the selected
                  template.
                minLength: 1
                type: string
              mode:
                default: ReadWrite
                description: Mode controls whether edits are allowed to be translated
                  back into ComponentParameter patches.
                enum:
                - ReadOnly
                - ReadWrite
                type: string
              parameterRef:
                description: ParameterRef identifies the ComponentParameter edited
                  through this view.
                properties:
                  name:
                    description: |-
                      Name of the referent.
                      More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                      TODO: Add other useful fields. apiVersion, kind, uid?
                    type: string
                type: object
                x-kubernetes-map-type: atomic
              sourceGeneration:
                description: |-
                  SourceGeneration captures the ComponentParameter generation used to build the current view.
                  Controllers should reject stale writes when this value no longer matches the source object.
                format: int64
                type: integer
              templateName:
                description: TemplateName identifies the config template inside the
                  referenced ComponentParameter.
                maxLength: 63
                pattern: ^[a-z0-9]([a-z0-9\.\-]*[a-z0-9])?$
                type: string
            required:
            - fileName
            - parameterRef
            - templateName
            type: object
          status:
            description: ParameterViewStatus defines the observed state of ParameterView.
            properties:
              conditions:
                description: Conditions captures detailed reconciliation and validation
                  status.
                items:
                  description: "Condition contains details for one aspect of the current
                    state of this API Resource.\n---\nThis struct is intended for
                    direct use as an array at the field path .status.conditions.  For
                    example,\n\n\n\ttype FooStatus struct{\n\t    // Represents the
                    observations of a foo's current state.\n\t    // Known .status.conditions.type
                    are: \"Available\", \"Progressing\", and \"Degraded\"\n\t    //
                    +patchMergeKey=type\n\t    // +patchStrategy=merge\n\t    // +listType=map\n\t
                    \   // +listMapKey=type\n\t    Conditions []metav1.Condition `json:\"conditions,omitempty\"
                    patchStrategy:\"merge\" patchMergeKey:\"type\" protobuf:\"bytes,1,rep,name=conditions\"`\n\n\n\t
                    \   // other fields\n\t}"
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: |-
                        type of condition in CamelCase or in foo.example.com/CamelCase.
                        ---
                        Many .condition.type values are consistent across resources like Available, but because arbitrary conditions can be
                        useful (see .node.status.conditions), the ability to deconflict is important.
                        The regex it matches is (dns1123SubdomainFmt/)?(qualifiedNameFmt)
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              message:
                description: Message provides a human-readable summary for the current
                  state.
                type: string
              observedGeneration:
                description: ObservedGeneration is the most recent ParameterView generation
                  observed by the controller.
                format: int64
                type: integer
              phase:
                description: Phase describes the current state of this view.
                enum:
                - Pending
                - Ready
                - Conflict
                - Invalid
                - Applying
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
