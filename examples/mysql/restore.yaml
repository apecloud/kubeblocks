apiVersion: apps.kubeblocks.io/v1
kind: Cluster
metadata:
  name: mysql-cluster-restore
  namespace: demo
spec:
  terminationPolicy: Delete
  restore:
    source:
      apiGroup: dataprotection.kubeblocks.io
      kind: Backup
      name: mysql-cluster-backup
      namespace: demo
    parameters:
      dataprotection.kubeblocks.io/volume-restore-policy: Parallel
  componentSpecs:
    - name: mysql
      componentDef: "mysql-8.0"  # match all CMPD named with 'mysql-8.0-'
      serviceVersion: 8.0.35
      disableExporter: false
      replicas: 2
      resources:
        limits:
          cpu: '0.5'
          memory: 0.5Gi
        requests:
          cpu: '0.5'
          memory: 0.5Gi
      volumeClaimTemplates:
        - name: data
          spec:
            storageClassName: ""
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 20Gi
